version: 2
name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release. Must exist and must match pyproject.toml version."
        required: true


jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Note: when you push a tag, GitHub runs git checkout on that tag and runs the workflow if present there. Then 'on push' finds the tag and then this checkout happens (I guess somewhat redundantly). We have the workflow dispatch to circumvent this.

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Hatch
        run: pip install hatch

      - name: Check version matches tag
        run: |
          TAG_VERSION=${{ github.event.inputs.tag || github.ref_name }}
          PROJECT_VERSION=$(hatch version)

          echo "Git tag version: $TAG_VERSION"
          echo "Project version: $PROJECT_VERSION"

          if [ "$TAG_VERSION" != "$PROJECT_VERSION" ]; then
            echo "❌ Version mismatch between tag ($TAG_VERSION) and pyproject.toml ($PROJECT_VERSION)"
            exit 1
          fi

      - name: Publish to PyPI
        env:
          HATCH_INDEX_USER: __token__
          HATCH_INDEX_AUTH: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          hatch build
          hatch publish
